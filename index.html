    META & SEO
    Configuration de base du document :
    charset, viewport, description SEO et titre
    ====================================================== -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aegis Bank, la néobanque éthique pour les créateurs de contenu. 
        Finance ton avenir avec transparence. 20€ offerts.">
    <title>Aegis Bank - néobanque éthique et transparente</title>

    <!-- =====================================================
    STYLESHEET
    Fichier CSS principal du projet
    ====================================================== -->
    <link rel="stylesheet" href="variables.css">

    <!-- =====================================================
    HEADER
    Contient la navigation principale du site
    ====================================================== -->

    <header class="header">

        <!-- Navigation principale -->

        <div class="navbar">

            <!-- Burger menu (mobile navigation trigger) -->

            <button class="navbar__burger">

                <svg width="30" height="30" viewBox="0 0 30 30">
                    <line x1="5" y1="8" x2="25" y2="8" stroke="#333" stroke-width="2" stroke-linecap="round" />
                    <line x1="5" y1="15" x2="25" y2="15" stroke="#333" stroke-width="2" stroke-linecap="round" />
                    <line x1="5" y1="22" x2="25" y2="22" stroke="#333" stroke-width="2" stroke-linecap="round" />
                </svg>

            </button>


            <!-- Actions utilisateur : login / register -->

            <div class="navbar__actions">

                <button class="navbar__button--login">
                    Se connecter
                </button>

                <button class="navbar__button--register">
                    S'inscrire
                </button>

            </div>

        </div>

    </header>


    <!-- =====================================================
    MAIN
    Contenu principal de la page
    ====================================================== -->

    <main class="main">


        <!-- =================================================
        HERO SECTION
        Présentation principale du produit / message marketing
        BOUTON CALL TO ACTION
        ================================================== -->

        <!--
        Correction : Ma div <hero-cta> servait à justifier l'emplacement de bouton,
            en passant via display : block; et par margin 0 auto, je peux supprimer 
            ma balise superflue et alléger mon code.

        -->

        <div class="hero">

            <h1 class="hero__title">
                La néobanque éthique & transparente
            </h1>

            <h2 class="hero__subtitle">
                Finance ton avenir avec une banque qui te ressemble.
                <br>
                Honnête, engagée et sans prise de tête
            </h2>

            <button class="hero__button">
                Téléchargez l'app !
            </button>

        </div>



        <!-- =================================================
        PROMO CARD
        Offre promotionnelle actuelle
        ================================================== -->

        <!-- 
        correction : une card représente un contenu autonome et indépendant,
        <article> au lieu de <div>.
        
        corection : utilisation de <strong> 
-->

        <article class="promo-card">
            <strong class="promo-card__amount">20€ offerts</strong>
            <p class="promo-card__date">Mars 2026</p>
        </article>
